<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M Signature Dynamic Hero</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f7f7f7;
--card:#ffffff;
--text:#222;
--sub:#777;
--soft:#efefef;
--shadow:0 12px 30px rgba(0,0,0,.08);
}

body.dark{
--bg:#101010;
--card:#1d1d1d;
--text:#f2f2f2;
--sub:#b0b0b0;
--soft:#2a2a2a;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:var(--bg);
color:var(--text);
transition:.3s;
overflow-x:hidden;
}

.container{
width:min(1450px,92%);
margin:auto;
padding:35px 0 80px;
}

/* HEADER */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:35px;
gap:20px;
}

.logo-wrap{
text-align:center;
flex:1;
}

.logo{
font-family:'Cormorant Garamond',serif;
font-size:5rem;
font-weight:600;
}

.subtitle{
letter-spacing:5px;
text-transform:uppercase;
color:var(--sub);
font-size:.9rem;
margin-top:6px;
}

.header-actions{
display:flex;
gap:12px;
}

.icon-btn{
border:none;
background:var(--card);
padding:14px 18px;
border-radius:50px;
cursor:pointer;
box-shadow:var(--shadow);
}

/* HERO */

.hero{
height:450px;
border-radius:30px;
overflow:hidden;
position:relative;
margin-bottom:35px;
box-shadow:var(--shadow);
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
transition:.3s;
}

.hero-overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.hero-overlay h2{
font-family:'Cormorant Garamond',serif;
font-size:4rem;
color:white;
margin-bottom:14px;
}

.hero-overlay p{
max-width:700px;
color:#f2f2f2;
line-height:1.8;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:28px;
margin-top:40px;
}

.card{
background:var(--card);
border-radius:28px;
overflow:hidden;
box-shadow:var(--shadow);
transition:.25s;
}

.card:hover{
transform:translateY(-8px);
}

.card-image{
height:340px;
position:relative;
overflow:hidden;
}

.card-image img{
width:100%;
height:100%;
object-fit:cover;
transition:.35s;
}

.card:hover img{
transform:scale(1.05);
}

.badge{
position:absolute;
top:16px;
left:16px;
background:rgba(255,255,255,.92);
padding:8px 14px;
border-radius:30px;
font-size:13px;
font-weight:600;
}

.content{
padding:22px;
}

.title{
font-size:1.4rem;
font-weight:600;
margin-bottom:10px;
}

.desc{
line-height:1.7;
color:var(--sub);
margin-bottom:18px;
}

.tags{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:18px;
}

.tag{
padding:8px 12px;
border-radius:30px;
background:var(--soft);
font-size:13px;
}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
}

.price{
font-size:1.4rem;
font-weight:700;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
border:none;
padding:12px 18px;
border-radius:30px;
cursor:pointer;
font-weight:600;
}

.add{
background:var(--soft);
color:var(--text);
}

.edit{
background:#dcdcdc;
}

.delete{
background:#ffdede;
color:#7a0000;
}

/* FLOATING OWNER BUTTON */

.owner-panel{
position:fixed;
bottom:25px;
right:25px;
z-index:999;
display:flex;
flex-direction:column;
gap:12px;
}

.owner-btn{
border:none;
background:#222;
color:white;
padding:16px 22px;
border-radius:50px;
cursor:pointer;
box-shadow:var(--shadow);
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:9999;
overflow-y:auto;
}

.modal-box{
background:var(--card);
padding:35px;
border-radius:30px;
width:min(700px,100%);
max-height:90vh;
overflow-y:auto;
}

.modal-box h2{
font-family:'Cormorant Garamond',serif;
font-size:3rem;
margin-bottom:20px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

.form-grid input,
.form-grid textarea,
.form-grid select{
padding:16px;
border:none;
border-radius:16px;
background:var(--soft);
font-family:inherit;
color:var(--text);
}

.form-grid textarea{
grid-column:1/-1;
height:120px;
resize:none;
}

.preview-image{
margin-top:20px;
width:220px;
height:220px;
border-radius:20px;
object-fit:cover;
display:none;
}

.modal-actions{
display:flex;
gap:15px;
margin-top:25px;
flex-wrap:wrap;
}

.close-btn{
background:var(--soft);
}

/* HERO MANAGER */

.hero-manager{
margin-top:25px;
padding:20px;
border-radius:20px;
background:var(--soft);
}

.hero-manager h3{
margin-bottom:15px;
}

footer{
margin-top:80px;
text-align:center;
color:var(--sub);
}

@media(max-width:768px){

.logo{
font-size:3.2rem;
}

.hero{
height:320px;
}

.hero-overlay h2{
font-size:2.4rem;
}

.topbar{
flex-direction:column;
}

}

</style>
</head>

<body>

<div class="container">

<div class="topbar">

<div style="width:120px;"></div>

<div class="logo-wrap">

<h1 class="logo">M Signature</h1>

<p class="subtitle">
Handmade Bags & Accessories
</p>

</div>

<div class="header-actions">

<button class="icon-btn" onclick="toggleTheme()">
✨
</button>

</div>

</div>

<section class="hero">

<img id="heroImage"
src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?q=80&w=1600&auto=format&fit=crop">

<div class="hero-overlay">

<h2 id="heroTitle">
Handmade With Care
</h2>

<p id="heroSubtitle">
Beautiful crochet bags and accessories thoughtfully designed with warmth and creativity.
</p>

</div>

</section>

<section class="products" id="products"></section>

<footer>
© 2026 M Signature • Handmade With Care
</footer>

</div>

<div class="owner-panel">

<button class="owner-btn" onclick="openProductModal()">
➕ Add Product
</button>

<button class="owner-btn" onclick="openHeroModal()">
🖼 Hero Manager
</button>

</div>

<!-- PRODUCT MODAL -->

<div class="modal" id="productModal">

<div class="modal-box">

<h2 id="productModalTitle">
Add Product
</h2>

<div class="form-grid">

<input id="productName" placeholder="Product Name">
<input id="productType" placeholder="Type">
<input id="productColor" placeholder="Color">
<input id="productSize" placeholder="Size">
<input id="productPrice" placeholder="Price">
<input id="inventoryCount" placeholder="Inventory Count">

<select id="productStatus">

<option>Made To Order</option>
<option>Ready To Ship</option>
<option>Sold Out</option>
<option>Archived</option>

</select>

<input type="file" id="imageUpload" accept="image/*">

<textarea id="productDescription" placeholder="Description"></textarea>

</div>

<img id="previewImage" class="preview-image">

<div class="modal-actions">

<button class="btn add" id="saveBtn" onclick="saveProduct()">
Save Product
</button>

<button class="btn close-btn" onclick="closeProductModal()">
Close
</button>

</div>

</div>

</div>

<!-- HERO MODAL -->

<div class="modal" id="heroModal">

<div class="modal-box">

<h2>
Hero Banner Manager
</h2>

<div class="hero-manager">

<h3>
Hero Image
</h3>

<input type="file" id="heroUpload" accept="image/*">

<img id="heroPreview" class="preview-image">

</div>

<div class="hero-manager">

<h3>
Hero Text
</h3>

<div class="form-grid">

<input id="heroTitleInput" placeholder="Hero Title">

<textarea id="heroSubtitleInput" placeholder="Hero Subtitle"></textarea>

</div>

</div>

<div class="modal-actions">

<button class="btn add" onclick="saveHeroChanges()">
Save Hero Changes
</button>

<button class="btn close-btn" onclick="closeHeroModal()">
Close
</button>

</div>

</div>

</div>

<script>

let uploadedImage = "";
let heroImageData = localStorage.getItem("mSignatureHeroImage") || "";
let editIndex = null;

let products = JSON.parse(localStorage.getItem("mSignatureProducts")) || [

{
name:"Midnight Tote",
type:"Tote",
color:"Black",
size:"Large",
price:85,
inventory:2,
status:"Made To Order",
image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1200&auto=format&fit=crop",
description:"Elegant handmade crochet tote with detailed stitching."
}

];

function saveStorage(){

localStorage.setItem("mSignatureProducts", JSON.stringify(products));

}

function renderProducts(){

const container = document.getElementById("products");

container.innerHTML = "";

products.forEach((product, index) => {

let inventoryLabel = `Inventory: ${product.inventory}`;

if(Number(product.inventory) <= 2 && Number(product.inventory) > 0){

inventoryLabel = `⚠ Low Stock: ${product.inventory}`;

}

if(Number(product.inventory) <= 0){

product.status = "Sold Out";

inventoryLabel = "Sold Out";

}

container.innerHTML += `

<div class="card">

<div class="card-image">

<img src="${product.image}">

<div class="badge">
${product.status}
</div>

</div>

<div class="content">

<div class="title">
${product.name}
</div>

<div class="desc">
${product.description}
</div>

<div class="tags">

<div class="tag">${product.type}</div>
<div class="tag">${product.color}</div>
<div class="tag">${product.size}</div>
<div class="tag">${inventoryLabel}</div>

</div>

<div class="bottom">

<div class="price">
$${product.price}
</div>

<div class="actions">

<button class="btn edit" onclick="editProduct(${index})">
Edit
</button>

<button class="btn delete" onclick="deleteProduct(${index})">
Delete
</button>

</div>

</div>

</div>

</div>

`;

});

saveStorage();

}

document.getElementById("imageUpload").addEventListener("change", function(event){

const file = event.target.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(e){

uploadedImage = e.target.result;

const preview = document.getElementById("previewImage");

preview.src = uploadedImage;

preview.style.display = "block";

};

reader.readAsDataURL(file);

}

});

document.getElementById("heroUpload").addEventListener("change", function(event){

const file = event.target.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(e){

heroImageData = e.target.result;

const preview = document.getElementById("heroPreview");

preview.src = heroImageData;

preview.style.display = "block";

};

reader.readAsDataURL(file);

}

});

function openProductModal(){

editIndex = null;

document.getElementById("productModalTitle").innerText = "Add Product";

document.getElementById("saveBtn").innerText = "Save Product";

clearForm();

document.getElementById("productModal").style.display = "flex";

}

function closeProductModal(){

document.getElementById("productModal").style.display = "none";

}

function openHeroModal(){

document.getElementById("heroTitleInput").value =
document.getElementById("heroTitle").innerText;

document.getElementById("heroSubtitleInput").value =
document.getElementById("heroSubtitle").innerText;

if(heroImageData){

const preview = document.getElementById("heroPreview");

preview.src = heroImageData;

preview.style.display = "block";

}

document.getElementById("heroModal").style.display = "flex";

}

function closeHeroModal(){

document.getElementById("heroModal").style.display = "none";

}

function editProduct(index){

editIndex = index;

const product = products[index];

document.getElementById("productModalTitle").innerText = "Edit Product";

document.getElementById("saveBtn").innerText = "Update Product";

document.getElementById("productName").value = product.name;
document.getElementById("productType").value = product.type;
document.getElementById("productColor").value = product.color;
document.getElementById("productSize").value = product.size;
document.getElementById("productPrice").value = product.price;
document.getElementById("inventoryCount").value = product.inventory;
document.getElementById("productStatus").value = product.status;
document.getElementById("productDescription").value = product.description;

uploadedImage = product.image;

const preview = document.getElementById("previewImage");

preview.src = uploadedImage;

preview.style.display = "block";

document.getElementById("productModal").style.display = "flex";

}

function saveProduct(){

const productData = {

name:document.getElementById("productName").value,
type:document.getElementById("productType").value,
color:document.getElementById("productColor").value,
size:document.getElementById("productSize").value,
price:document.getElementById("productPrice").value,
inventory:document.getElementById("inventoryCount").value,
status:document.getElementById("productStatus").value,
image:uploadedImage || "https://via.placeholder.com/500",
description:document.getElementById("productDescription").value

};

if(editIndex !== null){

products[editIndex] = productData;

alert("Product updated!");

}
else{

products.push(productData);

alert("Product added!");

}

saveStorage();

renderProducts();

closeProductModal();

}

function deleteProduct(index){

if(confirm("Delete this product?")){

products.splice(index,1);

saveStorage();

renderProducts();

}

}

function clearForm(){

document.getElementById("productName").value = "";
document.getElementById("productType").value = "";
document.getElementById("productColor").value = "";
document.getElementById("productSize").value = "";
document.getElementById("productPrice").value = "";
document.getElementById("inventoryCount").value = "";
document.getElementById("productDescription").value = "";

uploadedImage = "";

document.getElementById("previewImage").style.display = "none";

}

function saveHeroChanges(){

const title =
document.getElementById("heroTitleInput").value;

const subtitle =
document.getElementById("heroSubtitleInput").value;

document.getElementById("heroTitle").innerText = title;

document.getElementById("heroSubtitle").innerText = subtitle;

if(heroImageData){

document.getElementById("heroImage").src = heroImageData;

localStorage.setItem("mSignatureHeroImage", heroImageData);

}

localStorage.setItem("mSignatureHeroTitle", title);
localStorage.setItem("mSignatureHeroSubtitle", subtitle);

alert("Hero updated!");

closeHeroModal();

}

function loadHero(){

const savedTitle = localStorage.getItem("mSignatureHeroTitle");

const savedSubtitle = localStorage.getItem("mSignatureHeroSubtitle");

if(savedTitle){

document.getElementById("heroTitle").innerText = savedTitle;

}

if(savedSubtitle){

document.getElementById("heroSubtitle").innerText = savedSubtitle;

}

if(heroImageData){

document.getElementById("heroImage").src = heroImageData;

}

}

function toggleTheme(){

document.body.classList.toggle("dark");

}

renderProducts();

loadHero();

</script>

</body>
</html>
