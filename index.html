<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M Signature</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f6f6f6;
--card:#ffffff;
--text:#1f1f1f;
--sub:#777;
--soft:#efefef;
--shadow:0 10px 30px rgba(0,0,0,.08);
}

body.dark{
--bg:#121212;
--card:#1e1e1e;
--text:#f2f2f2;
--sub:#b3b3b3;
--soft:#2b2b2b;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:var(--bg);
color:var(--text);
transition:.3s;
overflow-x:hidden;
}

.container{
width:min(1450px,92%);
margin:auto;
padding:35px 0 80px;
}

/* HEADER */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
margin-bottom:35px;
}

.logo-wrap{
text-align:center;
flex:1;
}

.logo{
font-family:'Cormorant Garamond',serif;
font-size:5rem;
font-weight:600;
}

.subtitle{
letter-spacing:5px;
text-transform:uppercase;
font-size:.9rem;
margin-top:6px;
color:var(--sub);
}

.header-actions{
display:flex;
gap:10px;
}

.icon-btn{
border:none;
background:var(--card);
padding:14px 18px;
border-radius:50px;
cursor:pointer;
box-shadow:var(--shadow);
}

/* HERO */

.hero{
height:460px;
border-radius:30px;
overflow:hidden;
position:relative;
box-shadow:var(--shadow);
margin-bottom:50px;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
}

.hero-overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.hero-overlay h2{
font-family:'Cormorant Garamond',serif;
font-size:4rem;
color:white;
margin-bottom:15px;
}

.hero-overlay p{
max-width:700px;
line-height:1.8;
color:#f3f3f3;
}

/* FILTERS */

.filter-bar{
display:flex;
flex-wrap:wrap;
gap:14px;
margin-bottom:35px;
}

.filter-bar select{
padding:15px 18px;
border:none;
border-radius:18px;
background:var(--card);
box-shadow:var(--shadow);
font-family:inherit;
color:var(--text);
min-width:200px;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:32px;
}

.card{
background:var(--card);
border-radius:28px;
overflow:hidden;
box-shadow:var(--shadow);
transition:.28s;
}

.card:hover{
transform:translateY(-8px);
}

.card-image{
height:360px;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
padding:22px;
position:relative;
}

.card-image img{
width:100%;
height:100%;
object-fit:contain;
transition:.3s;
}

.card:hover img{
transform:scale(1.03);
}

.badge{
position:absolute;
top:16px;
left:16px;
background:rgba(255,255,255,.95);
padding:8px 14px;
border-radius:30px;
font-size:12px;
font-weight:600;
}

.seasonal-badge{
position:absolute;
top:16px;
right:16px;
background:#fff3dc;
color:#7a5400;
padding:8px 14px;
border-radius:30px;
font-size:12px;
font-weight:600;
}

.content{
padding:24px;
}

.title{
font-size:1.45rem;
font-weight:600;
margin-bottom:10px;
}

.desc{
line-height:1.8;
color:var(--sub);
margin-bottom:20px;
}

.tags{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.tag{
padding:9px 14px;
border-radius:30px;
background:var(--soft);
font-size:12px;
}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
}

.price{
font-size:1.5rem;
font-weight:700;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
border:none;
padding:12px 18px;
border-radius:30px;
cursor:pointer;
font-weight:600;
transition:.2s;
}

.btn:hover{
transform:translateY(-2px);
}

.edit{
background:#e5e5e5;
}

.delete{
background:#ffe1e1;
color:#7a0000;
}

.archive{
background:#ede5ff;
color:#6033a3;
}

/* OWNER BUTTONS */

.owner-panel{
position:fixed;
bottom:25px;
right:25px;
display:flex;
flex-direction:column;
gap:12px;
z-index:999;
}

.owner-btn{
border:none;
background:#1f1f1f;
color:white;
padding:16px 22px;
border-radius:50px;
cursor:pointer;
box-shadow:var(--shadow);
}

/* MODALS */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:9999;
overflow-y:auto;
}

.modal-box{
background:var(--card);
padding:35px;
border-radius:30px;
width:min(750px,100%);
max-height:90vh;
overflow-y:auto;
}

.modal-box h2{
font-family:'Cormorant Garamond',serif;
font-size:3rem;
margin-bottom:20px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

.form-grid input,
.form-grid textarea,
.form-grid select{
padding:16px;
border:none;
border-radius:16px;
background:var(--soft);
font-family:inherit;
color:var(--text);
}

.form-grid textarea{
grid-column:1/-1;
height:120px;
resize:none;
}

.preview-image{
margin-top:20px;
width:220px;
height:220px;
object-fit:contain;
background:#f5f5f5;
padding:12px;
border-radius:20px;
display:none;
}

.modal-actions{
display:flex;
gap:14px;
margin-top:25px;
flex-wrap:wrap;
}

.close-btn{
background:var(--soft);
}

/* FOOTER */

footer{
margin-top:80px;
text-align:center;
color:var(--sub);
}

/* MOBILE */

@media(max-width:768px){

.logo{
font-size:3rem;
}

.hero{
height:340px;
}

.hero-overlay h2{
font-size:2.5rem;
}

.topbar{
flex-direction:column;
}

}

</style>
</head>

<body>

<div class="container">

<div class="topbar">

<div style="width:120px;"></div>

<div class="logo-wrap">

<h1 class="logo">
M Signature
</h1>

<p class="subtitle">
Handmade Bags & Accessories
</p>

</div>

<div class="header-actions">

<button class="icon-btn" onclick="toggleTheme()">
✨
</button>

</div>

</div>

<!-- HERO -->

<section class="hero">

<img id="heroImage"
src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?q=80&w=1600&auto=format&fit=crop">

<div class="hero-overlay">

<h2 id="heroTitle">
Handmade With Care
</h2>

<p id="heroSubtitle">
Beautiful crochet bags and accessories thoughtfully designed with warmth and creativity.
</p>

</div>

</section>

<!-- FILTERS -->

<div class="filter-bar">

<select id="filterCategory">

<option value="All">
All Categories
</option>

<option value="Tote Bag">
Tote Bag
</option>

<option value="Handbag">
Handbag
</option>

<option value="Cross-Functional Bag">
Cross-Functional Bag
</option>

<option value="Shoulder Bag">
Shoulder Bag
</option>

</select>

<select id="filterProcess">

<option value="All">
All Processes
</option>

<option value="Ready to Ship">
Ready to Ship
</option>

<option value="Made to Order">
Made to Order
</option>

</select>

<select id="filterSeasonal">

<option value="All">
All Products
</option>

<option value="Seasonal Collection">
Seasonal Collection
</option>

</select>

</div>

<!-- PRODUCTS -->

<section class="products" id="products"></section>

<footer>
© 2026 M Signature • Handmade With Care
</footer>

</div>

<!-- OWNER BUTTONS -->

<div
class="owner-panel"
id="ownerPanel"
style="display:none;">

<button class="owner-btn"
onclick="openProductModal()">
➕ Add Product
</button>

<button class="owner-btn"
onclick="openHeroModal()">
🖼 Hero Manager
</button>

</div>

<!-- HIDDEN ADMIN BUTTON -->

<div
onclick="unlockAdmin()"
style="
position:fixed;
bottom:10px;
left:10px;
width:18px;
height:18px;
opacity:0;
cursor:pointer;
z-index:9999;
">
</div>

<!-- PRODUCT MODAL -->

<div class="modal" id="productModal">

<div class="modal-box">

<h2 id="productModalTitle">
Add Product
</h2>

<div class="form-grid">

<input id="productName" placeholder="Product Name">

<select id="productType">

<option>Tote Bag</option>

<option>Handbag</option>

<option>Cross-Functional Bag</option>

<option>Shoulder Bag</option>

</select>

<input id="productColor" placeholder="Color">

<input id="productSize" placeholder="Size">

<input id="productPrice" placeholder="Price">

<input id="inventoryCount" placeholder="Inventory Count">

<select id="productStatus">

<option>Ready to Ship</option>

<option>Made to Order</option>

<option>Archived</option>

</select>

<select id="seasonalToggle">

<option>No Seasonal Collection</option>

<option>Seasonal Collection</option>

</select>

<input type="file" id="imageUpload" accept="image/*">

<textarea id="productDescription" placeholder="Description"></textarea>

</div>

<img id="previewImage" class="preview-image">

<div class="modal-actions">

<button class="btn" onclick="saveProduct()">
Save Product
</button>

<button class="btn close-btn" onclick="closeProductModal()">
Close
</button>

</div>

</div>

</div>

<!-- HERO MODAL -->

<div class="modal" id="heroModal">

<div class="modal-box">

<h2>
Hero Banner Manager
</h2>

<div class="form-grid">

<input id="heroTitleInput" placeholder="Hero Title">

<textarea id="heroSubtitleInput" placeholder="Hero Subtitle"></textarea>

<input type="file" id="heroUpload" accept="image/*">

</div>

<img id="heroPreview" class="preview-image">

<div class="modal-actions">

<button class="btn" onclick="saveHeroChanges()">
Save Hero Changes
</button>

<button class="btn close-btn" onclick="closeHeroModal()">
Close
</button>

</div>

</div>

</div>

<script>

  <script>

let uploadedImage = "";
let heroImageData = localStorage.getItem("mSignatureHeroImage") || "";
let editIndex = null;

/* ADMIN MODE */

let adminMode = false;

const ADMIN_PASSWORD = "MSignatureAdmin";

/* PRODUCTS */

let products =
JSON.parse(localStorage.getItem("mSignatureProducts")) || [

{
name:"Midnight Tote",
type:"Tote Bag",
color:"Black",
size:"Large",
price:85,
inventory:2,
status:"Made to Order",
seasonal:"No Seasonal Collection",
image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1200&auto=format&fit=crop",
description:"Elegant handmade crochet tote with detailed stitching."
}

];

/* SAVE */

function saveStorage(){

localStorage.setItem(
"mSignatureProducts",
JSON.stringify(products)
);

}

/* ADMIN TOGGLE */

function unlockAdmin(){

const password = prompt(
"Enter Admin Password"
);

if(password === ADMIN_PASSWORD){

adminMode = true;

document.getElementById(
"ownerPanel"
).style.display = "flex";

renderProducts();

alert("Admin Mode Enabled");

}
else{

alert("Incorrect Password");

}

}

/* RENDER PRODUCTS */

function renderProducts(){

const container =
document.getElementById("products");

container.innerHTML = "";

const categoryFilter =
document.getElementById("filterCategory").value;

const processFilter =
document.getElementById("filterProcess").value;

const seasonalFilter =
document.getElementById("filterSeasonal").value;

products.forEach((product,index)=>{

if(
(categoryFilter !== "All" && product.type !== categoryFilter)
||
(processFilter !== "All" && product.status !== processFilter)
||
(seasonalFilter !== "All"
&& product.seasonal !== seasonalFilter)
){
return;
}

let inventoryLabel =
`Inventory: ${product.inventory}`;

if(Number(product.inventory) <= 2
&& Number(product.inventory) > 0){

inventoryLabel =
`⚠ Low Stock: ${product.inventory}`;

}

if(Number(product.inventory) <= 0){

inventoryLabel = "Sold Out";

}

container.innerHTML += `

<div class="card">

<div class="card-image">

<img src="${product.image}">

<div class="badge">
${product.status}
</div>

${product.seasonal === "Seasonal Collection"
? `<div class="seasonal-badge">
Seasonal
</div>`
: ""}

</div>

<div class="content">

<div class="title">
${product.name}
</div>

<div class="desc">
${product.description}
</div>

<div class="tags">

<div class="tag">
${product.type}
</div>

<div class="tag">
${product.color}
</div>

<div class="tag">
${product.size}
</div>

<div class="tag">
${inventoryLabel}
</div>

</div>

<div class="bottom">

<div class="price">
$${product.price}
</div>

<div class="actions">

${adminMode ? `

<button class="btn edit"
onclick="editProduct(${index})">
Edit
</button>

<button class="btn archive"
onclick="archiveProduct(${index})">
Archive
</button>

<button class="btn delete"
onclick="deleteProduct(${index})">
Delete
</button>

` : ``}

</div>

</div>

</div>

</div>

`;

});

saveStorage();

}

/* FILTERS */

document.getElementById("filterCategory")
.addEventListener("change",renderProducts);

document.getElementById("filterProcess")
.addEventListener("change",renderProducts);

document.getElementById("filterSeasonal")
.addEventListener("change",renderProducts);

/* IMAGE UPLOAD */

document.getElementById("imageUpload")
.addEventListener("change",function(event){

const file = event.target.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(e){

uploadedImage = e.target.result;

const preview =
document.getElementById("previewImage");

preview.src = uploadedImage;

preview.style.display = "block";

};

reader.readAsDataURL(file);

}

});

/* HERO UPLOAD */

document.getElementById("heroUpload")
.addEventListener("change",function(event){

const file = event.target.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(e){

heroImageData = e.target.result;

const preview =
document.getElementById("heroPreview");

preview.src = heroImageData;

preview.style.display = "block";

};

reader.readAsDataURL(file);

}

});

/* PRODUCT MODAL */

function openProductModal(){

editIndex = null;

document.getElementById(
"productModalTitle"
).innerText = "Add Product";

clearForm();

document.getElementById(
"productModal"
).style.display = "flex";

}

function closeProductModal(){

document.getElementById(
"productModal"
).style.display = "none";

}

/* HERO MODAL */

function openHeroModal(){

document.getElementById(
"heroTitleInput"
).value =
document.getElementById(
"heroTitle"
).innerText;

document.getElementById(
"heroSubtitleInput"
).value =
document.getElementById(
"heroSubtitle"
).innerText;

if(heroImageData){

const preview =
document.getElementById("heroPreview");

preview.src = heroImageData;

preview.style.display = "block";

}

document.getElementById(
"heroModal"
).style.display = "flex";

}

function closeHeroModal(){

document.getElementById(
"heroModal"
).style.display = "none";

}

/* SAVE HERO */

function saveHeroChanges(){

const title =
document.getElementById(
"heroTitleInput"
).value;

const subtitle =
document.getElementById(
"heroSubtitleInput"
).value;

document.getElementById(
"heroTitle"
).innerText = title;

document.getElementById(
"heroSubtitle"
).innerText = subtitle;

if(heroImageData){

document.getElementById(
"heroImage"
).src = heroImageData;

localStorage.setItem(
"mSignatureHeroImage",
heroImageData
);

}

localStorage.setItem(
"mSignatureHeroTitle",
title
);

localStorage.setItem(
"mSignatureHeroSubtitle",
subtitle
);

alert("Hero updated!");

closeHeroModal();

}

/* LOAD HERO */

function loadHero(){

const savedTitle =
localStorage.getItem(
"mSignatureHeroTitle"
);

const savedSubtitle =
localStorage.getItem(
"mSignatureHeroSubtitle"
);

if(savedTitle){

document.getElementById(
"heroTitle"
).innerText = savedTitle;

}

if(savedSubtitle){

document.getElementById(
"heroSubtitle"
).innerText = savedSubtitle;

}

if(heroImageData){

document.getElementById(
"heroImage"
).src = heroImageData;

}

}

/* SAVE PRODUCT */

function saveProduct(){

const productData = {

name:
document.getElementById(
"productName"
).value,

type:
document.getElementById(
"productType"
).value,

color:
document.getElementById(
"productColor"
).value,

size:
document.getElementById(
"productSize"
).value,

price:
document.getElementById(
"productPrice"
).value,

inventory:
document.getElementById(
"inventoryCount"
).value,

status:
document.getElementById(
"productStatus"
).value,

seasonal:
document.getElementById(
"seasonalToggle"
).value,

image:
uploadedImage
|| "https://via.placeholder.com/500",

description:
document.getElementById(
"productDescription"
).value

};

if(editIndex !== null){

products[editIndex] = productData;

}
else{

products.push(productData);

}

saveStorage();

renderProducts();

closeProductModal();

}

/* EDIT */

function editProduct(index){

editIndex = index;

const product = products[index];

document.getElementById(
"productModalTitle"
).innerText = "Edit Product";

document.getElementById(
"productName"
).value = product.name;

document.getElementById(
"productType"
).value = product.type;

document.getElementById(
"productColor"
).value = product.color;

document.getElementById(
"productSize"
).value = product.size;

document.getElementById(
"productPrice"
).value = product.price;

document.getElementById(
"inventoryCount"
).value = product.inventory;

document.getElementById(
"productStatus"
).value = product.status;

document.getElementById(
"seasonalToggle"
).value = product.seasonal;

document.getElementById(
"productDescription"
).value = product.description;

uploadedImage = product.image;

const preview =
document.getElementById(
"previewImage"
);

preview.src = uploadedImage;

preview.style.display = "block";

document.getElementById(
"productModal"
).style.display = "flex";

}

/* DELETE */

function deleteProduct(index){

if(confirm("Delete this product?")){

products.splice(index,1);

saveStorage();

renderProducts();

}

}

/* ARCHIVE */

function archiveProduct(index){

products[index].status = "Archived";

saveStorage();

renderProducts();

}

/* CLEAR */

function clearForm(){

document.getElementById(
"productName"
).value = "";

document.getElementById(
"productColor"
).value = "";

document.getElementById(
"productSize"
).value = "";

document.getElementById(
"productPrice"
).value = "";

document.getElementById(
"inventoryCount"
).value = "";

document.getElementById(
"productDescription"
).value = "";

uploadedImage = "";

document.getElementById(
"previewImage"
).style.display = "none";

}

/* THEME */

function toggleTheme(){

document.body.classList.toggle("dark");

}

/* INIT */

renderProducts();

loadHero();

</script>

</script>

</body>
</html>
